<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle">Architecture &#8212; 5 Layers, 35 Skills</text>
  <text x="600" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#666" text-anchor="middle">Each layer exists because agents consistently fail at something specific with Stitch</text>

  <!-- Layer 1: Orchestrator -->
  <rect x="60" y="95" width="1080" height="60" rx="8" fill="#1e1e2e" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="60" y="95" width="6" height="60" rx="3" fill="#a855f7"/>
  <text x="90" y="125" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#a855f7">ORCHESTRATOR</text>
  <text x="260" y="125" font-family="ui-monospace, monospace" font-size="13" fill="#888">stitch-orchestrator</text>
  <text x="700" y="120" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">Agents don't know when to brainstorm vs generate vs iterate.</text>
  <text x="700" y="138" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">Specificity scoring routes your request automatically.</text>
  <rect x="1020" y="108" width="100" height="28" rx="14" fill="#a855f722"/>
  <text x="1070" y="127" font-family="ui-monospace, monospace" font-size="13" fill="#a855f7" text-anchor="middle">1 skill</text>

  <!-- Arrow -->
  <text x="600" y="175" font-family="system-ui, sans-serif" font-size="16" fill="#555" text-anchor="middle">&#8595;</text>

  <!-- Layer 2: Brain -->
  <rect x="60" y="185" width="1080" height="60" rx="8" fill="#1e1e2e" stroke="#c084fc" stroke-width="1.5"/>
  <rect x="60" y="185" width="6" height="60" rx="3" fill="#c084fc"/>
  <text x="90" y="215" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#c084fc">BRAIN</text>
  <text x="180" y="215" font-family="ui-monospace, monospace" font-size="13" fill="#888">ideate &#183; spec-generator &#183; prompt-architect &#183; design-variants &#183; ued-guide</text>
  <text x="700" y="210" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">Agents write terrible Stitch prompts. The brain does design research,</text>
  <text x="700" y="228" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">builds structured specs, and engineers prompts that produce quality output.</text>
  <rect x="1020" y="198" width="100" height="28" rx="14" fill="#c084fc22"/>
  <text x="1070" y="217" font-family="ui-monospace, monospace" font-size="13" fill="#c084fc" text-anchor="middle">5 skills</text>

  <!-- Arrow -->
  <text x="600" y="265" font-family="system-ui, sans-serif" font-size="16" fill="#555" text-anchor="middle">&#8595;</text>

  <!-- Layer 3: MCP Wrappers -->
  <rect x="60" y="275" width="1080" height="60" rx="8" fill="#1e1e2e" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="60" y="275" width="6" height="60" rx="3" fill="#38bdf8"/>
  <text x="90" y="305" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#38bdf8">MCP WRAPPERS</text>
  <text x="260" y="305" font-family="ui-monospace, monospace" font-size="13" fill="#888">stitch-mcp-* (generate, get, list, edit, variants, design systems...)</text>
  <text x="700" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">Stitch uses different ID formats across tools (numeric vs projects/ID).</text>
  <text x="700" y="318" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">Every agent gets this wrong. Every. Single. Time. Wrappers handle it.</text>
  <rect x="1020" y="288" width="100" height="28" rx="14" fill="#38bdf822"/>
  <text x="1070" y="307" font-family="ui-monospace, monospace" font-size="13" fill="#38bdf8" text-anchor="middle">14 skills</text>

  <!-- Arrow -->
  <text x="600" y="355" font-family="system-ui, sans-serif" font-size="16" fill="#555" text-anchor="middle">&#8595;</text>

  <!-- Layer 4: Conversion -->
  <rect x="60" y="365" width="1080" height="60" rx="8" fill="#1e1e2e" stroke="#2dd4bf" stroke-width="1.5"/>
  <rect x="60" y="365" width="6" height="60" rx="3" fill="#2dd4bf"/>
  <text x="90" y="395" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#2dd4bf">CONVERSION</text>
  <text x="240" y="395" font-family="ui-monospace, monospace" font-size="13" fill="#888">nextjs &#183; svelte &#183; react &#183; react-native &#183; swiftui &#183; html &#183; shadcn &#183; design-system &#183; remotion</text>
  <text x="700" y="390" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">Stitch outputs raw HTML. These convert to production components with</text>
  <text x="700" y="408" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">dark mode, design tokens, TypeScript, and proper component architecture.</text>
  <rect x="1020" y="378" width="100" height="28" rx="14" fill="#2dd4bf22"/>
  <text x="1070" y="397" font-family="ui-monospace, monospace" font-size="13" fill="#2dd4bf" text-anchor="middle">11 skills</text>

  <!-- Arrow -->
  <text x="600" y="445" font-family="system-ui, sans-serif" font-size="16" fill="#555" text-anchor="middle">&#8595;</text>

  <!-- Layer 5: Quality -->
  <rect x="60" y="455" width="1080" height="52" rx="8" fill="#1e1e2e" stroke="#5eead4" stroke-width="1.5"/>
  <rect x="60" y="455" width="6" height="52" rx="3" fill="#5eead4"/>
  <text x="90" y="486" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#5eead4">QUALITY</text>
  <text x="210" y="486" font-family="ui-monospace, monospace" font-size="13" fill="#888">a11y &#183; animate &#183; skill-creator &#183; setup</text>
  <text x="700" y="481" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">WCAG compliance, purposeful motion with prefers-reduced-motion, and meta-tooling.</text>
  <rect x="1020" y="468" width="100" height="28" rx="14" fill="#5eead422"/>
  <text x="1070" y="487" font-family="ui-monospace, monospace" font-size="13" fill="#5eead4" text-anchor="middle">4 skills</text>
</svg>
